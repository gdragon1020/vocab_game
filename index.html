<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詞庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1e2e;
    --bg2: #222638;
    --bg3: #2a2f45;
    --border: #363c55;
    --text: #e8e4d9;
    --text-dim: #8e95b0;
    --accent: #5b7cf6;
    --accent-soft: rgba(91,124,246,0.12);
    --accent-ja: #c4606a;
    --accent-ja-soft: rgba(196,96,106,0.12);
    --green: #4caf8a;
    --red: #e07070;
    --yellow: #e0b870;
    --radius: 10px;
    --lang-accent: var(--accent);
    --lang-accent-soft: var(--accent-soft);
  }
  body.ja {
    --lang-accent: var(--accent-ja);
    --lang-accent-soft: var(--accent-ja-soft);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    font-size: 15px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.01em;
    color: var(--text);
  }
  .logo span { color: var(--lang-accent); transition: color 0.3s; }

  /* LANG TABS */
  .lang-tabs {
    display: flex;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-tab {
    padding: 7px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    border: none;
    background: none;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .lang-tab.active {
    background: var(--lang-accent);
    color: #fff;
  }

  /* NAV */
  nav {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
  }
  .nav-btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }
  .nav-btn.active, .nav-btn:hover {
    background: var(--bg3);
    color: var(--text);
  }
  .nav-btn.active { color: var(--lang-accent); }

  /* MAIN */
  main { padding: 28px 32px; max-width: 900px; margin: 0 auto; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* SECTION TITLE */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    margin-bottom: 24px;
    color: var(--text);
  }

  /* FORM */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  input, select, textarea {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--lang-accent); }
  textarea { resize: vertical; min-height: 72px; }
  select option { background: var(--bg2); }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--lang-accent);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--lang-accent); color: var(--lang-accent); }
  .btn-danger {
    background: none;
    color: var(--red);
    border: 1px solid transparent;
  }
  .btn-danger:hover { border-color: var(--red); }
  .form-actions { display: flex; gap: 10px; margin-top: 4px; }

  /* WORD LIST */
  .list-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .list-controls input { flex: 1; }
  .filter-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    font-family: inherit;
    transition: all 0.2s;
  }
  .filter-badge.active {
    background: var(--lang-accent-soft);
    border-color: var(--lang-accent);
    color: var(--lang-accent);
  }
  .word-count { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }

  .word-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    transition: border-color 0.2s;
  }
  .word-card:hover { border-color: var(--lang-accent); }
  .word-card.mastered { border-left: 3px solid var(--green); }
  .word-main {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    margin-bottom: 4px;
  }
  .word-pos {
    font-size: 11px;
    color: var(--lang-accent);
    background: var(--lang-accent-soft);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-right: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .word-usage { font-size: 13px; color: var(--text-dim); margin-top: 5px; line-height: 1.5; }
  .word-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .word-tag {
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg3);
    padding: 2px 8px;
    border-radius: 4px;
  }
  .mastery-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .mastery-bar {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    flex: 1;
    max-width: 80px;
    overflow: hidden;
  }
  .mastery-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--green);
    transition: width 0.4s;
  }
  .mastery-label { font-size: 11px; color: var(--text-dim); }
  .card-actions { display: flex; gap: 6px; align-items: flex-start; }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px;
    border-radius: 5px;
    font-size: 14px;
    transition: all 0.2s;
  }
  .icon-btn:hover { color: var(--text); background: var(--bg3); }
  .icon-btn.del:hover { color: var(--red); }

  /* QUIZ */
  .quiz-setup {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 500px;
  }
  .quiz-setup h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 20px; }
  .quiz-option { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .quiz-option label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .number-input { display: flex; align-items: center; gap: 10px; }
  .number-input input { width: 70px; text-align: center; }
  .quiz-info { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }

  /* QUIZ SESSION */
  .quiz-session { max-width: 600px; }
  .quiz-progress {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1;
    height: 5px;
    background: var(--bg3);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--lang-accent);
    border-radius: 3px;
    transition: width 0.4s;
  }
  .progress-text { font-size: 13px; color: var(--text-dim); white-space: nowrap; }

  .quiz-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    margin-bottom: 20px;
  }
  .quiz-type-label {
    font-size: 11px;
    color: var(--lang-accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .quiz-question {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .quiz-hint { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

  /* MULTIPLE CHOICE */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--lang-accent); background: var(--lang-accent-soft); }
  .choice-btn.correct { border-color: var(--green); background: rgba(76,175,138,0.12); color: var(--green); }
  .choice-btn.wrong { border-color: var(--red); background: rgba(224,112,112,0.12); color: var(--red); }
  .choice-btn:disabled { cursor: default; }

  /* FILL IN */
  .fill-input-wrap { display: flex; gap: 10px; }
  .fill-input-wrap input { flex: 1; font-size: 16px; padding: 12px 16px; }
  .fill-result {
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    display: none;
  }
  .fill-result.correct { background: rgba(76,175,138,0.12); color: var(--green); border: 1px solid var(--green); }
  .fill-result.wrong { background: rgba(224,112,112,0.12); color: var(--red); border: 1px solid var(--red); }

  .quiz-nav { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  /* QUIZ RESULT */
  .quiz-result {
    text-align: center;
    padding: 40px 20px;
    max-width: 500px;
    margin: 0 auto;
  }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 72px;
    color: var(--lang-accent);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-label { font-size: 16px; color: var(--text-dim); margin-bottom: 28px; }
  .result-breakdown {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    text-align: left;
  }
  .breakdown-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .breakdown-row:last-child { border: none; }
  .breakdown-row .val.green { color: var(--green); }
  .breakdown-row .val.red { color: var(--red); }
  .breakdown-row .val.yellow { color: var(--yellow); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* EDIT MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    width: 90%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 20px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    padding: 14px 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--lang-accent); }
  .stat-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }

  /* LOADING */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--lang-accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-wrap { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 14px; padding: 40px; justify-content: center; }

  @media (max-width: 600px) {
    main { padding: 20px 16px; }
    header { padding: 14px 16px; }
    nav { padding: 10px 16px; overflow-x: auto; }
    .form-grid { grid-template-columns: 1fr; }
    .choices { grid-template-columns: 1fr; }
    .quiz-question { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">詞<span>庫</span></div>
  <div class="lang-tabs">
    <button class="lang-tab active" onclick="setLang('en')">English</button>
    <button class="lang-tab" onclick="setLang('ja')">日本語</button>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showView('list')">📚 單字庫</button>
  <button class="nav-btn" onclick="showView('add')">＋ 新增單字</button>
  <button class="nav-btn" onclick="showView('quiz')">✏️ 測驗</button>
</nav>

<main>
  <!-- LIST VIEW -->
  <div class="view active" id="view-list">
    <div class="stats-bar" id="stats-bar">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">總單字</div></div>
      <div class="stat"><div class="stat-num" id="stat-mastered">—</div><div class="stat-lbl">已熟練</div></div>
      <div class="stat"><div class="stat-num" id="stat-learning">—</div><div class="stat-lbl">學習中</div></div>
    </div>
    <div class="list-controls">
      <input type="text" id="search-input" placeholder="搜尋單字…" oninput="filterWords()">
      <button class="filter-badge active" onclick="setFilter('all', this)">全部</button>
      <button class="filter-badge" onclick="setFilter('learning', this)">學習中</button>
      <button class="filter-badge" onclick="setFilter('mastered', this)">已熟練</button>
    </div>
    <div class="word-count" id="word-count"></div>
    <div id="word-list"></div>
  </div>

  <!-- ADD VIEW -->
  <div class="view" id="view-add">
    <div class="section-title">新增單字</div>
    <div class="form-grid">
      <div class="form-group full">
        <label>單字 / 片語 *</label>
        <input type="text" id="f-word" placeholder="e.g. ephemeral / 儚い">
      </div>
      <div class="form-group">
        <label>詞性</label>
        <select id="f-pos">
          <option value="">— 選擇詞性 —</option>
          <option>n. 名詞</option>
          <option>v. 動詞</option>
          <option>adj. 形容詞</option>
          <option>adv. 副詞</option>
          <option>prep. 介系詞</option>
          <option>conj. 連接詞</option>
          <option>phr. 片語</option>
          <option>exp. 慣用語</option>
        </select>
      </div>
      <div class="form-group">
        <label>同義詞</label>
        <input type="text" id="f-syn" placeholder="transient, fleeting…">
      </div>
      <div class="form-group">
        <label>反義詞</label>
        <input type="text" id="f-ant" placeholder="permanent, eternal…">
      </div>
      <div class="form-group full">
        <label>用法例句</label>
        <textarea id="f-usage" placeholder="The ephemeral beauty of cherry blossoms…"></textarea>
      </div>
      <div class="form-group full">
        <label>筆記 / 記憶口訣</label>
        <textarea id="f-notes" placeholder="自己的記憶方式…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="addWord()">新增單字</button>
      <button class="btn btn-secondary" onclick="clearForm()">清除</button>
    </div>
  </div>

  <!-- QUIZ VIEW -->
  <div class="view" id="view-quiz">
    <div id="quiz-setup-panel">
      <div class="section-title">測驗</div>
      <div class="quiz-setup">
        <h2>設定測驗</h2>
        <div class="quiz-info" id="quiz-avail-info">載入中…</div>
        <div class="quiz-option">
          <label>題數</label>
          <div class="number-input">
            <input type="number" id="quiz-count" value="10" min="1" max="50">
            <span style="color:var(--text-dim);font-size:13px">題</span>
          </div>
        </div>
        <div class="quiz-option">
          <label>包含熟用單字</label>
          <select id="quiz-include-mastered">
            <option value="no">不包含（預設）</option>
            <option value="yes">包含（低機率出現）</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()" style="width:100%">開始測驗</button>
      </div>
    </div>
    <div id="quiz-session-panel" style="display:none">
      <div class="quiz-session">
        <div class="quiz-progress">
          <div class="progress-bar"><div class="progress-fill" id="q-progress"></div></div>
          <div class="progress-text" id="q-progress-text"></div>
        </div>
        <div class="quiz-card" id="quiz-card"></div>
        <div class="quiz-nav" id="quiz-nav"></div>
      </div>
    </div>
    <div id="quiz-result-panel" style="display:none"></div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">編輯單字</div>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group full">
        <label>單字 / 片語 *</label>
        <input type="text" id="edit-word">
      </div>
      <div class="form-group">
        <label>詞性</label>
        <select id="edit-pos">
          <option value="">— 選擇詞性 —</option>
          <option>n. 名詞</option>
          <option>v. 動詞</option>
          <option>adj. 形容詞</option>
          <option>adv. 副詞</option>
          <option>prep. 介系詞</option>
          <option>conj. 連接詞</option>
          <option>phr. 片語</option>
          <option>exp. 慣用語</option>
        </select>
      </div>
      <div class="form-group">
        <label>同義詞</label>
        <input type="text" id="edit-syn">
      </div>
      <div class="form-group">
        <label>反義詞</label>
        <input type="text" id="edit-ant">
      </div>
      <div class="form-group full">
        <label>用法例句</label>
        <textarea id="edit-usage"></textarea>
      </div>
      <div class="form-group full">
        <label>筆記 / 記憶口訣</label>
        <textarea id="edit-notes"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xdgwmnpmvoalwckeamqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ3dtbnBtdm9hbHdja2VhbXFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MzE3NjQsImV4cCI6MjA5NTUwNzc2NH0.ht3mvrli_osiCmHl72xCqL4YWdETc9VXOMfXaZj1wX8';

let currentLang = 'en';
let allWords = [];
let currentFilter = 'all';

// ─── API ───────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  if (method === 'DELETE' || (method === 'PATCH' && res.status === 204)) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function fetchWords() {
  const list = document.getElementById('word-list');
  list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 載入中…</div>';
  try {
    allWords = await api('GET', `words?language=eq.${currentLang}&order=created_at.desc`);
    renderList();
    updateStats();
    updateQuizInfo();
  } catch(e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>載入失敗：${e.message}</p></div>`;
  }
}

// ─── LANG ─────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('ja', lang === 'ja');
  document.querySelectorAll('.lang-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && lang === 'en') || (i === 1 && lang === 'ja'));
  });
  fetchWords();
}

// ─── VIEWS ────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['list','add','quiz'][i] === name);
  });
  if (name === 'list') fetchWords();
  if (name === 'quiz') updateQuizInfo();
}

// ─── RENDER LIST ──────────────────────────────────────
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let words = allWords.filter(w => {
    const matchSearch = !search ||
      w.word.toLowerCase().includes(search) ||
      (w.synonyms || '').toLowerCase().includes(search) ||
      (w.usage || '').toLowerCase().includes(search);
    const matchFilter = currentFilter === 'all' ||
      (currentFilter === 'mastered' && w.mastery >= 10) ||
      (currentFilter === 'learning' && w.mastery < 10);
    return matchSearch && matchFilter;
  });

  document.getElementById('word-count').textContent = `顯示 ${words.length} 個單字`;

  const list = document.getElementById('word-list');
  if (words.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">${search ? '🔍' : '📖'}</div><p>${search ? '找不到符合的單字' : '還沒有單字，去新增一個吧！'}</p></div>`;
    return;
  }
  list.innerHTML = words.map(w => wordCardHTML(w)).join('');
}

function wordCardHTML(w) {
  const pct = (w.mastery / 10) * 100;
  const mastered = w.mastery >= 10;
  return `<div class="word-card ${mastered ? 'mastered' : ''}" id="card-${w.id}">
    <div>
      <div class="word-main">${esc(w.word)}</div>
      <div>
        ${w.part_of_speech ? `<span class="word-pos">${esc(w.part_of_speech)}</span>` : ''}
        ${mastered ? '<span style="font-size:11px;color:var(--green)">✓ 熟練</span>' : ''}
      </div>
      ${w.usage ? `<div class="word-usage">${esc(w.usage)}</div>` : ''}
      <div class="word-tags">
        ${w.synonyms ? `<span class="word-tag">≈ ${esc(w.synonyms)}</span>` : ''}
        ${w.antonyms ? `<span class="word-tag">≠ ${esc(w.antonyms)}</span>` : ''}
        ${w.notes ? `<span class="word-tag">💡 ${esc(w.notes)}</span>` : ''}
      </div>
      <div class="mastery-bar-wrap">
        <div class="mastery-bar"><div class="mastery-fill" style="width:${pct}%"></div></div>
        <span class="mastery-label">${w.mastery}/10</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="icon-btn" onclick="openEdit('${w.id}')" title="編輯">✏️</button>
      <button class="icon-btn del" onclick="deleteWord('${w.id}')" title="刪除">🗑</button>
    </div>
  </div>`;
}

function updateStats() {
  const total = allWords.length;
  const mastered = allWords.filter(w => w.mastery >= 10).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-learning').textContent = total - mastered;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-badge').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function filterWords() { renderList(); }

// ─── ADD ──────────────────────────────────────────────
async function addWord() {
  const word = document.getElementById('f-word').value.trim();
  if (!word) { toast('請輸入單字', 'error'); return; }
  try {
    const newWord = await api('POST', 'words', {
      language: currentLang,
      word,
      part_of_speech: document.getElementById('f-pos').value || null,
      usage: document.getElementById('f-usage').value.trim() || null,
      synonyms: document.getElementById('f-syn').value.trim() || null,
      antonyms: document.getElementById('f-ant').value.trim() || null,
      notes: document.getElementById('f-notes').value.trim() || null,
      mastery: 0
    });
    allWords.unshift(newWord[0]);
    clearForm();
    renderList();
    updateStats();
    toast('✓ 單字已新增');
    showView('list');
  } catch(e) {
    toast('新增失敗：' + e.message, 'error');
  }
}

function clearForm() {
  ['f-word','f-pos','f-usage','f-syn','f-ant','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    el.value = '';
  });
}

// ─── EDIT ─────────────────────────────────────────────
function openEdit(id) {
  const w = allWords.find(x => x.id === id);
  if (!w) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-word').value = w.word;
  document.getElementById('edit-pos').value = w.part_of_speech || '';
  document.getElementById('edit-syn').value = w.synonyms || '';
  document.getElementById('edit-ant').value = w.antonyms || '';
  document.getElementById('edit-usage').value = w.usage || '';
  document.getElementById('edit-notes').value = w.notes || '';
  document.getElementById('edit-modal').classList.add('show');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const word = document.getElementById('edit-word').value.trim();
  if (!word) { toast('單字不能為空', 'error'); return; }
  try {
    await api('PATCH', `words?id=eq.${id}`, {
      word,
      part_of_speech: document.getElementById('edit-pos').value || null,
      synonyms: document.getElementById('edit-syn').value.trim() || null,
      antonyms: document.getElementById('edit-ant').value.trim() || null,
      usage: document.getElementById('edit-usage').value.trim() || null,
      notes: document.getElementById('edit-notes').value.trim() || null,
    });
    const idx = allWords.findIndex(x => x.id === id);
    if (idx !== -1) {
      allWords[idx] = { ...allWords[idx], word,
        part_of_speech: document.getElementById('edit-pos').value || null,
        synonyms: document.getElementById('edit-syn').value.trim() || null,
        antonyms: document.getElementById('edit-ant').value.trim() || null,
        usage: document.getElementById('edit-usage').value.trim() || null,
        notes: document.getElementById('edit-notes').value.trim() || null,
      };
    }
    closeModal();
    renderList();
    toast('✓ 已儲存');
  } catch(e) {
    toast('儲存失敗：' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('edit-modal').classList.remove('show');
}

// ─── DELETE ───────────────────────────────────────────
async function deleteWord(id) {
  if (!confirm('確定要刪除這個單字嗎？')) return;
  try {
    await api('DELETE', `words?id=eq.${id}`);
    allWords = allWords.filter(w => w.id !== id);
    renderList();
    updateStats();
    toast('已刪除');
  } catch(e) {
    toast('刪除失敗', 'error');
  }
}

// ─── QUIZ ─────────────────────────────────────────────
let quizQueue = [];
let quizIndex = 0;
let quizResults = [];
let currentAnswer = null;
let answered = false;

function updateQuizInfo() {
  const learning = allWords.filter(w => w.mastery < 10);
  const mastered = allWords.filter(w => w.mastery >= 10);
  document.getElementById('quiz-avail-info').innerHTML =
    `學習中：<strong>${learning.length}</strong> 個單字　熟練：<strong>${mastered.length}</strong> 個單字<br>
     <span style="font-size:12px;color:var(--text-dim)">答對 +1 分，答錯 -1 分，滿 10 分進入熟用庫</span>`;
  const countInput = document.getElementById('quiz-count');
  countInput.max = Math.max(learning.length + mastered.length, 1);
}

function buildQuizPool(includeMastered) {
  const learning = allWords.filter(w => w.mastery < 10);
  const mastered = allWords.filter(w => w.mastery >= 10);
  let pool = [...learning];
  if (includeMastered) {
    // 熟練單字以 20% 機率混入
    mastered.forEach(w => { if (Math.random() < 0.2) pool.push(w); });
  }
  return pool;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  const count = parseInt(document.getElementById('quiz-count').value);
  const includeMastered = document.getElementById('quiz-include-mastered').value === 'yes';
  const pool = buildQuizPool(includeMastered);
  if (pool.length === 0) {
    toast('沒有可測驗的單字！', 'error'); return;
  }
  quizQueue = shuffle(pool).slice(0, Math.min(count, pool.length));
  quizIndex = 0;
  quizResults = [];
  document.getElementById('quiz-setup-panel').style.display = 'none';
  document.getElementById('quiz-result-panel').style.display = 'none';
  document.getElementById('quiz-session-panel').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const w = quizQueue[quizIndex];
  const total = quizQueue.length;
  const pct = (quizIndex / total) * 100;
  document.getElementById('q-progress').style.width = pct + '%';
  document.getElementById('q-progress-text').textContent = `${quizIndex + 1} / ${total}`;

  // 隨機選題型
  const isMC = Math.random() < 0.5;
  answered = false;
  currentAnswer = null;

  const card = document.getElementById('quiz-card');
  const nav = document.getElementById('quiz-nav');

  if (isMC) {
    // 選擇題：顯示用法/例句，猜單字
    const distractors = shuffle(allWords.filter(x => x.id !== w.id)).slice(0, 3);
    const choices = shuffle([w, ...distractors]);
    const hasHint = w.usage || w.synonyms;

    card.innerHTML = `
      <div class="quiz-type-label">選擇題</div>
      <div class="quiz-question">${esc(w.usage || w.synonyms || w.part_of_speech || '？')}</div>
      <div class="quiz-hint">${hasHint ? '這個單字是什麼？' : '選出正確的單字'}</div>
      <div class="choices">
        ${choices.map(c => `<button class="choice-btn" onclick="answerMC(this, '${c.id}', '${w.id}')">${esc(c.word)}</button>`).join('')}
      </div>`;
    nav.innerHTML = `<button class="btn btn-secondary" onclick="nextQuestion()" id="next-btn" disabled>下一題 →</button>`;
  } else {
    // 填空題：顯示單字，輸入中文意思（或反過來）
    card.innerHTML = `
      <div class="quiz-type-label">填空題</div>
      <div class="quiz-question">${esc(w.word)}</div>
      <div class="quiz-hint">${w.part_of_speech ? `(${esc(w.part_of_speech)})` : ''} 請輸入用法、同義詞或解釋（可參考你的筆記）</div>
      <div class="fill-input-wrap">
        <input type="text" id="fill-ans" placeholder="輸入你的答案…" onkeydown="if(event.key==='Enter')checkFill()">
        <button class="btn btn-primary" onclick="checkFill()">確認</button>
      </div>
      <div class="fill-result" id="fill-result"></div>
      ${w.notes ? `<div style="margin-top:12px;font-size:12px;color:var(--text-dim)">💡 ${esc(w.notes)}</div>` : ''}`;
    nav.innerHTML = `
      <button class="btn btn-secondary" onclick="markFill(false)">✗ 答錯了</button>
      <button class="btn btn-primary" onclick="markFill(true)">✓ 答對了</button>`;
    setTimeout(() => document.getElementById('fill-ans')?.focus(), 100);
  }
}

function answerMC(btn, choiceId, correctId) {
  if (answered) return;
  answered = true;
  const correct = choiceId === correctId;
  btn.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.onclick.toString().includes(`'${correctId}'`)) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  document.getElementById('next-btn').disabled = false;
  recordResult(correct);
}

function checkFill() {
  const ans = document.getElementById('fill-ans')?.value.trim();
  const w = quizQueue[quizIndex];
  const ref = [w.usage, w.synonyms, w.antonyms, w.notes].filter(Boolean).join(' ').toLowerCase();
  const result = document.getElementById('fill-result');
  result.style.display = 'block';
  result.innerHTML = `<strong>參考答案：</strong>${esc(w.usage || w.synonyms || '（無範本，請自行判斷）')}`;
  result.className = 'fill-result';
}

function markFill(correct) {
  if (answered) return;
  answered = true;
  recordResult(correct);
  const nav = document.getElementById('quiz-nav');
  nav.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>`;
}

async function recordResult(correct) {
  const w = quizQueue[quizIndex];
  const delta = correct ? 1 : -1;
  const newMastery = Math.max(0, Math.min(10, w.mastery + delta));
  quizResults.push({ word: w, correct, newMastery });
  // update in DB
  try {
    await api('PATCH', `words?id=eq.${w.id}`, { mastery: newMastery });
    const idx = allWords.findIndex(x => x.id === w.id);
    if (idx !== -1) allWords[idx].mastery = newMastery;
  } catch(e) { /* silent */ }
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showQuizResult();
  } else {
    renderQuestion();
  }
}

function showQuizResult() {
  document.getElementById('quiz-session-panel').style.display = 'none';
  const correct = quizResults.filter(r => r.correct).length;
  const total = quizResults.length;
  const newMastered = quizResults.filter(r => r.newMastery >= 10 && r.word.mastery < 10).length;
  const pct = Math.round((correct / total) * 100);

  const panel = document.getElementById('quiz-result-panel');
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="quiz-result">
      <div class="result-score">${pct}%</div>
      <div class="result-label">答對 ${correct} / ${total} 題</div>
      <div class="result-breakdown">
        <div class="breakdown-row"><span>答對</span><span class="val green">${correct} 題</span></div>
        <div class="breakdown-row"><span>答錯</span><span class="val red">${total - correct} 題</span></div>
        ${newMastered > 0 ? `<div class="breakdown-row"><span>新進熟用庫</span><span class="val yellow">✦ ${newMastered} 個單字</span></div>` : ''}
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-primary" onclick="startQuiz()">再測一次</button>
        <button class="btn btn-secondary" onclick="backToSetup()">返回設定</button>
      </div>
    </div>`;
}

function backToSetup() {
  document.getElementById('quiz-result-panel').style.display = 'none';
  document.getElementById('quiz-setup-panel').style.display = 'block';
  updateQuizInfo();
}

// ─── UTILS ────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// close modal on overlay click
document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ─── INIT ─────────────────────────────────────────────
fetchWords();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>詞庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1e2e; --bg2: #222638; --bg3: #2a2f45;
    --border: #363c55; --text: #e8e4d9; --text-dim: #8e95b0;
    --accent: #5b7cf6; --accent-soft: rgba(91,124,246,0.12);
    --accent-ja: #c4606a; --accent-ja-soft: rgba(196,96,106,0.12);
    --green: #4caf8a; --red: #e07070; --yellow: #e0b870;
    --radius: 10px;
    --la: var(--accent); --las: var(--accent-soft);
  }
  body.ja { --la: var(--accent-ja); --las: var(--accent-ja-soft); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 15px; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 22px; }
  .logo span { color: var(--la); transition: color 0.3s; }
  .lang-tabs { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .lang-tab { padding: 7px 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-dim); border: none; background: none; transition: all 0.2s; letter-spacing: 0.04em; }
  .lang-tab.active { background: var(--la); color: #fff; }

  nav { display: flex; gap: 4px; padding: 16px 32px; border-bottom: 1px solid var(--border); }
  .nav-btn { padding: 7px 16px; border-radius: 7px; border: none; background: none; color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; font-family: inherit; }
  .nav-btn.active, .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { color: var(--la); }

  main { padding: 28px 32px; max-width: 900px; margin: 0 auto; }
  .view { display: none; } .view.active { display: block; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 26px; margin-bottom: 24px; }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  input, select, textarea { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 14px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, select:focus, textarea:focus { border-color: var(--la); }
  textarea { resize: vertical; min-height: 60px; }
  select option { background: var(--bg2); }

  .btn { padding: 10px 22px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; transition: all 0.2s; }
  .btn-primary { background: var(--la); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--la); color: var(--la); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .form-actions { display: flex; gap: 10px; margin-top: 4px; }

  /* USAGE ROWS */
  .usage-section { margin-bottom: 14px; }
  .usage-section > label { font-size: 12px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .usage-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .usage-row input { margin: 0; }
  .del-usage-btn { background: none; border: 1px solid transparent; color: var(--text-dim); border-radius: 6px; padding: 8px 10px; cursor: pointer; font-size: 14px; transition: all 0.2s; flex-shrink: 0; }
  .del-usage-btn:hover { color: var(--red); border-color: var(--red); }
  .add-usage-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px dashed var(--border); color: var(--text-dim); border-radius: var(--radius); padding: 8px 14px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; margin-top: 4px; }
  .add-usage-btn:hover { border-color: var(--la); color: var(--la); }

  /* LIST */
  .list-controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
  .list-controls input { flex: 1; min-width: 160px; }
  .filter-badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text-dim); font-family: inherit; transition: all 0.2s; }
  .filter-badge.active { background: var(--las); border-color: var(--la); color: var(--la); }
  .word-count { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; }

  .word-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr auto; gap: 8px; transition: border-color 0.2s; }
  .word-card:hover { border-color: var(--la); }
  .word-card.mastered { border-left: 3px solid var(--green); }
  .word-main { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 2px; }
  .word-zh { font-size: 14px; color: var(--text-dim); margin-bottom: 6px; }
  .word-pos { font-size: 11px; color: var(--la); background: var(--las); padding: 2px 8px; border-radius: 4px; display: inline-block; margin-right: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .usage-list { margin-top: 8px; }
  .usage-item { display: flex; gap: 10px; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .usage-item:last-child { border: none; }
  .usage-en { color: var(--text); flex: 1; }
  .usage-zh { color: var(--text-dim); flex: 1; }
  .word-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .word-tag { font-size: 11px; color: var(--text-dim); background: var(--bg3); padding: 2px 8px; border-radius: 4px; }
  .mastery-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .mastery-bar { height: 4px; background: var(--bg3); border-radius: 2px; flex: 1; max-width: 80px; overflow: hidden; }
  .mastery-fill { height: 100%; border-radius: 2px; background: var(--green); transition: width 0.4s; }
  .mastery-label { font-size: 11px; color: var(--text-dim); }
  .card-actions { display: flex; gap: 6px; align-items: flex-start; }
  .icon-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; border-radius: 5px; font-size: 14px; transition: all 0.2s; }
  .icon-btn:hover { color: var(--text); background: var(--bg3); }
  .icon-btn.del:hover { color: var(--red); }

  /* STATS */
  .stats-bar { display: flex; gap: 20px; margin-bottom: 24px; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
  .stat { text-align: center; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--la); }
  .stat-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; }

  /* QUIZ */
  .quiz-setup { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; max-width: 500px; }
  .quiz-setup h2 { font-family: 'DM Serif Display', serif; font-size: 22px; margin-bottom: 20px; }
  .quiz-option { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .quiz-option label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; }
  .quiz-info { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
  .number-input { display: flex; align-items: center; gap: 10px; }
  .number-input input { width: 70px; text-align: center; }

  .quiz-session { max-width: 600px; }
  .quiz-progress { display: flex; align-items: center; gap: 14px; margin-bottom: 28px; }
  .progress-bar { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--la); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 13px; color: var(--text-dim); white-space: nowrap; }

  .quiz-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 32px; margin-bottom: 20px; }
  .quiz-type-label { font-size: 11px; color: var(--la); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; margin-bottom: 12px; }
  .quiz-question { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; line-height: 1.3; }
  .quiz-hint { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn { padding: 14px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); cursor: pointer; font-size: 14px; font-family: inherit; text-align: left; transition: all 0.2s; line-height: 1.4; }
  .choice-btn:hover:not(:disabled) { border-color: var(--la); background: var(--las); }
  .choice-btn.correct { border-color: var(--green); background: rgba(76,175,138,0.12); color: var(--green); }
  .choice-btn.wrong { border-color: var(--red); background: rgba(224,112,112,0.12); color: var(--red); }
  .choice-btn:disabled { cursor: default; }

  .fill-input-wrap { display: flex; gap: 10px; }
  .fill-input-wrap input { flex: 1; font-size: 16px; padding: 12px 16px; }
  .fill-result { margin-top: 14px; padding: 12px 16px; border-radius: var(--radius); font-size: 14px; display: none; line-height: 1.6; }
  .fill-result.show { display: block; }
  .fill-result.correct { background: rgba(76,175,138,0.12); color: var(--green); border: 1px solid var(--green); }
  .fill-result.wrong { background: rgba(224,112,112,0.12); color: var(--red); border: 1px solid var(--red); }
  .quiz-nav { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  .quiz-result { text-align: center; padding: 40px 20px; max-width: 500px; margin: 0 auto; }
  .result-score { font-family: 'DM Serif Display', serif; font-size: 72px; color: var(--la); line-height: 1; margin-bottom: 8px; }
  .result-label { font-size: 16px; color: var(--text-dim); margin-bottom: 28px; }
  .result-breakdown { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 24px; text-align: left; }
  .breakdown-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .breakdown-row:last-child { border: none; }
  .val.green { color: var(--green); } .val.red { color: var(--red); } .val.yellow { color: var(--yellow); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 20px; }

  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; font-size: 14px; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  .loading-wrap { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 14px; padding: 40px; justify-content: center; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--la); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    main { padding: 20px 16px; } header { padding: 14px 16px; } nav { padding: 10px 16px; overflow-x: auto; }
    .form-grid { grid-template-columns: 1fr; } .choices { grid-template-columns: 1fr; }
    .quiz-question { font-size: 22px; } .usage-row { grid-template-columns: 1fr auto; }
    .usage-row input:first-child { grid-column: 1 / -1; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">詞<span>庫</span></div>
  <div class="lang-tabs">
    <button class="lang-tab active" onclick="setLang('en')">English</button>
    <button class="lang-tab" onclick="setLang('ja')">日本語</button>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showView('list')">📚 單字庫</button>
  <button class="nav-btn" onclick="showView('add')">＋ 新增單字</button>
  <button class="nav-btn" onclick="showView('quiz')">✏️ 測驗</button>
</nav>

<main>
  <!-- LIST -->
  <div class="view active" id="view-list">
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">總單字</div></div>
      <div class="stat"><div class="stat-num" id="stat-mastered">—</div><div class="stat-lbl">已熟練</div></div>
      <div class="stat"><div class="stat-num" id="stat-learning">—</div><div class="stat-lbl">學習中</div></div>
    </div>
    <div class="list-controls">
      <input type="text" id="search-input" placeholder="搜尋單字…" oninput="renderList()">
      <button class="filter-badge active" onclick="setFilter('all',this)">全部</button>
      <button class="filter-badge" onclick="setFilter('learning',this)">學習中</button>
      <button class="filter-badge" onclick="setFilter('mastered',this)">已熟練</button>
    </div>
    <div class="word-count" id="word-count"></div>
    <div id="word-list"></div>
  </div>

  <!-- ADD -->
  <div class="view" id="view-add">
    <div class="section-title">新增單字</div>
    <div class="form-grid">
      <div class="form-group">
        <label>單字 / 片語 *</label>
        <input type="text" id="f-word" placeholder="e.g. multitude">
      </div>
      <div class="form-group">
        <label>中文翻譯 *</label>
        <input type="text" id="f-zh" placeholder="e.g. 大量；眾多">
      </div>
      <div class="form-group">
        <label>詞性</label>
        <select id="f-pos">
          <option value="">— 選擇詞性 —</option>
          <option>n. 名詞</option><option>v. 動詞</option><option>adj. 形容詞</option>
          <option>adv. 副詞</option><option>prep. 介系詞</option><option>conj. 連接詞</option>
          <option>phr. 片語</option><option>exp. 慣用語</option>
        </select>
      </div>
      <div class="form-group">
        <label>同義詞</label>
        <input type="text" id="f-syn" placeholder="crowd, masses…">
      </div>
      <div class="form-group">
        <label>反義詞</label>
        <input type="text" id="f-ant" placeholder="few, minority…">
      </div>
      <div class="form-group">
        <label>筆記 / 記憶口訣</label>
        <input type="text" id="f-notes" placeholder="自己的記憶方式…">
      </div>
    </div>

    <div class="usage-section">
      <label>用法（英文片語 + 中文解釋）</label>
      <div id="add-usage-rows"></div>
      <button class="add-usage-btn" onclick="addUsageRow('add-usage-rows')">＋ 新增用法</button>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" onclick="addWord()">新增單字</button>
      <button class="btn btn-secondary" onclick="clearForm()">清除</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div class="view" id="view-quiz">
    <div id="quiz-setup-panel">
      <div class="section-title">測驗</div>
      <div class="quiz-setup">
        <h2>設定測驗</h2>
        <div class="quiz-info" id="quiz-avail-info">載入中…</div>
        <div class="quiz-option">
          <label>題數</label>
          <div class="number-input">
            <input type="number" id="quiz-count" value="10" min="1" max="100">
            <span style="color:var(--text-dim);font-size:13px">題</span>
          </div>
        </div>
        <div class="quiz-option">
          <label>包含熟用單字</label>
          <select id="quiz-include-mastered">
            <option value="no">不包含（預設）</option>
            <option value="yes">包含（低機率出現）</option>
          </select>
        </div>
        <button class="btn btn-primary" onclick="startQuiz()" style="width:100%;margin-top:4px">開始測驗</button>
      </div>
    </div>
    <div id="quiz-session-panel" style="display:none">
      <div class="quiz-session">
        <div class="quiz-progress">
          <div class="progress-bar"><div class="progress-fill" id="q-progress"></div></div>
          <div class="progress-text" id="q-progress-text"></div>
        </div>
        <div class="quiz-card" id="quiz-card"></div>
        <div class="quiz-nav" id="quiz-nav"></div>
      </div>
    </div>
    <div id="quiz-result-panel" style="display:none"></div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">編輯單字</div>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group">
        <label>單字 / 片語 *</label>
        <input type="text" id="edit-word">
      </div>
      <div class="form-group">
        <label>中文翻譯 *</label>
        <input type="text" id="edit-zh">
      </div>
      <div class="form-group">
        <label>詞性</label>
        <select id="edit-pos">
          <option value="">— 選擇詞性 —</option>
          <option>n. 名詞</option><option>v. 動詞</option><option>adj. 形容詞</option>
          <option>adv. 副詞</option><option>prep. 介系詞</option><option>conj. 連接詞</option>
          <option>phr. 片語</option><option>exp. 慣用語</option>
        </select>
      </div>
      <div class="form-group">
        <label>同義詞</label>
        <input type="text" id="edit-syn">
      </div>
      <div class="form-group">
        <label>反義詞</label>
        <input type="text" id="edit-ant">
      </div>
      <div class="form-group">
        <label>筆記 / 記憶口訣</label>
        <input type="text" id="edit-notes">
      </div>
    </div>
    <div class="usage-section">
      <label>用法（英文片語 + 中文解釋）</label>
      <div id="edit-usage-rows"></div>
      <button class="add-usage-btn" onclick="addUsageRow('edit-usage-rows')">＋ 新增用法</button>
    </div>
    <div class="form-actions" style="margin-top:16px">
      <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xdgwmnpmvoalwckeamqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ3dtbnBtdm9hbHdja2VhbXFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MzE3NjQsImV4cCI6MjA5NTUwNzc2NH0.ht3mvrli_osiCmHl72xCqL4YWdETc9VXOMfXaZj1wX8';

let currentLang = 'en';
let allWords = [];
let currentFilter = 'all';

// ── API ──────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=minimal'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) throw new Error(await res.text());
  if (method === 'DELETE' || res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ── LANG ─────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('ja', lang === 'ja');
  document.querySelectorAll('.lang-tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0&&lang==='en')||(i===1&&lang==='ja')));
  fetchWords();
}

// ── VIEWS ────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i) =>
    b.classList.toggle('active', ['list','add','quiz'][i]===name));
  if (name==='list') fetchWords();
  if (name==='quiz') updateQuizInfo();
  if (name==='add') initAddForm();
}

// ── FETCH ────────────────────────────────────────────
async function fetchWords() {
  const list = document.getElementById('word-list');
  list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 載入中…</div>';
  try {
    allWords = await api('GET', `words?language=eq.${currentLang}&order=created_at.desc`) || [];
    renderList(); updateStats(); updateQuizInfo();
  } catch(e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>載入失敗：${e.message}</p></div>`;
  }
}

// ── RENDER LIST ──────────────────────────────────────
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let words = allWords.filter(w => {
    const usages = parseUsages(w.usage);
    const matchSearch = !search ||
      w.word.toLowerCase().includes(search) ||
      (w.translation||'').includes(search) ||
      (w.synonyms||'').toLowerCase().includes(search) ||
      usages.some(u => u.en.toLowerCase().includes(search) || u.zh.includes(search));
    const matchFilter = currentFilter==='all' ||
      (currentFilter==='mastered'&&w.mastery>=10) ||
      (currentFilter==='learning'&&w.mastery<10);
    return matchSearch && matchFilter;
  });
  document.getElementById('word-count').textContent = `顯示 ${words.length} 個單字`;
  const list = document.getElementById('word-list');
  if (!words.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">${search?'🔍':'📖'}</div><p>${search?'找不到符合的單字':'還沒有單字，去新增一個吧！'}</p></div>`;
    return;
  }
  list.innerHTML = words.map(w => wordCardHTML(w)).join('');
}

function wordCardHTML(w) {
  const pct = (w.mastery/10)*100;
  const mastered = w.mastery>=10;
  const usages = parseUsages(w.usage);
  return `<div class="word-card${mastered?' mastered':''}">
    <div>
      <div class="word-main">${esc(w.word)}</div>
      <div class="word-zh">${esc(w.translation||'')}</div>
      <div>
        ${w.part_of_speech?`<span class="word-pos">${esc(w.part_of_speech)}</span>`:''}
        ${mastered?'<span style="font-size:11px;color:var(--green)">✓ 熟練</span>':''}
      </div>
      ${usages.length?`<div class="usage-list">${usages.map(u=>`<div class="usage-item"><span class="usage-en">${esc(u.en)}</span><span class="usage-zh">${esc(u.zh)}</span></div>`).join('')}</div>`:''}
      <div class="word-tags">
        ${w.synonyms?`<span class="word-tag">≈ ${esc(w.synonyms)}</span>`:''}
        ${w.antonyms?`<span class="word-tag">≠ ${esc(w.antonyms)}</span>`:''}
        ${w.notes?`<span class="word-tag">💡 ${esc(w.notes)}</span>`:''}
      </div>
      <div class="mastery-bar-wrap">
        <div class="mastery-bar"><div class="mastery-fill" style="width:${pct}%"></div></div>
        <span class="mastery-label">${w.mastery}/10</span>
      </div>
    </div>
    <div class="card-actions">
      <button class="icon-btn" onclick="openEdit('${w.id}')">✏️</button>
      <button class="icon-btn del" onclick="deleteWord('${w.id}')">🗑</button>
    </div>
  </div>`;
}

function updateStats() {
  const mastered = allWords.filter(w=>w.mastery>=10).length;
  document.getElementById('stat-total').textContent = allWords.length;
  document.getElementById('stat-mastered').textContent = mastered;
  document.getElementById('stat-learning').textContent = allWords.length-mastered;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-badge').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── USAGE ROWS ───────────────────────────────────────
function addUsageRow(containerId, en='', zh='') {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'usage-row';
  row.innerHTML = `
    <input type="text" placeholder="英文片語　e.g. a multitude of" value="${esc(en)}">
    <input type="text" placeholder="中文解釋　e.g. 大量的；許多的" value="${esc(zh)}">
    <button class="del-usage-btn" onclick="this.parentElement.remove()">✕</button>`;
  container.appendChild(row);
}

function getUsageRows(containerId) {
  const rows = document.querySelectorAll(`#${containerId} .usage-row`);
  const result = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const en = inputs[0].value.trim();
    const zh = inputs[1].value.trim();
    if (en || zh) result.push({ en, zh });
  });
  return result;
}

function parseUsages(raw) {
  if (!raw) return [];
  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {
    // legacy plain text
    if (raw) return [{ en: raw, zh: '' }];
  }
  return [];
}

// ── ADD ──────────────────────────────────────────────
function initAddForm() {
  document.getElementById('add-usage-rows').innerHTML = '';
  addUsageRow('add-usage-rows');
}

async function addWord() {
  const word = document.getElementById('f-word').value.trim();
  const zh = document.getElementById('f-zh').value.trim();
  if (!word) { toast('請輸入單字', 'error'); return; }
  if (!zh) { toast('請輸入中文翻譯', 'error'); return; }
  const usages = getUsageRows('add-usage-rows');
  try {
    const result = await api('POST', 'words', {
      language: currentLang, word,
      translation: zh,
      part_of_speech: document.getElementById('f-pos').value || null,
      usage: usages.length ? JSON.stringify(usages) : null,
      synonyms: document.getElementById('f-syn').value.trim() || null,
      antonyms: document.getElementById('f-ant').value.trim() || null,
      notes: document.getElementById('f-notes').value.trim() || null,
      mastery: 0
    });
    allWords.unshift(result[0]);
    clearForm();
    renderList(); updateStats();
    toast('✓ 單字已新增');
    showView('list');
  } catch(e) { toast('新增失敗：'+e.message,'error'); }
}

function clearForm() {
  ['f-word','f-zh','f-pos','f-syn','f-ant','f-notes'].forEach(id => {
    const el = document.getElementById(id); el.value='';
  });
  document.getElementById('add-usage-rows').innerHTML='';
  addUsageRow('add-usage-rows');
}

// ── EDIT ─────────────────────────────────────────────
function openEdit(id) {
  const w = allWords.find(x=>x.id===id);
  if (!w) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-word').value = w.word;
  document.getElementById('edit-zh').value = w.translation || '';
  document.getElementById('edit-pos').value = w.part_of_speech || '';
  document.getElementById('edit-syn').value = w.synonyms || '';
  document.getElementById('edit-ant').value = w.antonyms || '';
  document.getElementById('edit-notes').value = w.notes || '';
  const container = document.getElementById('edit-usage-rows');
  container.innerHTML = '';
  const usages = parseUsages(w.usage);
  if (usages.length) usages.forEach(u => addUsageRow('edit-usage-rows', u.en, u.zh));
  else addUsageRow('edit-usage-rows');
  document.getElementById('edit-modal').classList.add('show');
}

async function saveEdit() {
  const id = document.getElementById('edit-id').value;
  const word = document.getElementById('edit-word').value.trim();
  const zh = document.getElementById('edit-zh').value.trim();
  if (!word) { toast('單字不能為空','error'); return; }
  if (!zh) { toast('中文翻譯不能為空','error'); return; }
  const usages = getUsageRows('edit-usage-rows');
  try {
    await api('PATCH', `words?id=eq.${id}`, {
      word, translation: zh,
      part_of_speech: document.getElementById('edit-pos').value || null,
      synonyms: document.getElementById('edit-syn').value.trim() || null,
      antonyms: document.getElementById('edit-ant').value.trim() || null,
      usage: usages.length ? JSON.stringify(usages) : null,
      notes: document.getElementById('edit-notes').value.trim() || null,
    });
    const idx = allWords.findIndex(x=>x.id===id);
    if (idx!==-1) allWords[idx] = { ...allWords[idx], word, translation: zh,
      part_of_speech: document.getElementById('edit-pos').value||null,
      synonyms: document.getElementById('edit-syn').value.trim()||null,
      antonyms: document.getElementById('edit-ant').value.trim()||null,
      usage: usages.length?JSON.stringify(usages):null,
      notes: document.getElementById('edit-notes').value.trim()||null };
    closeModal(); renderList();
    toast('✓ 已儲存');
  } catch(e) { toast('儲存失敗：'+e.message,'error'); }
}

function closeModal() { document.getElementById('edit-modal').classList.remove('show'); }

// ── DELETE ───────────────────────────────────────────
async function deleteWord(id) {
  if (!confirm('確定要刪除這個單字嗎？')) return;
  try {
    await api('DELETE', `words?id=eq.${id}`);
    allWords = allWords.filter(w=>w.id!==id);
    renderList(); updateStats();
    toast('已刪除');
  } catch(e) { toast('刪除失敗','error'); }
}

// ── QUIZ ─────────────────────────────────────────────
let quizQueue = [], quizIndex = 0, quizResults = [], answered = false;

// 把每個單字和它的用法都展開成測驗題
function buildQuizItems(words) {
  const items = [];
  words.forEach(w => {
    // 單字本身：看中文猜英文、看英文猜中文
    items.push({ type: 'word', direction: 'zh2en', word: w, question: w.translation, answer: w.word });
    items.push({ type: 'word', direction: 'en2zh', word: w, question: w.word, answer: w.translation });
    // 每條用法
    const usages = parseUsages(w.usage);
    usages.forEach(u => {
      if (u.en && u.zh) {
        items.push({ type: 'usage', direction: 'zh2en', word: w, question: u.zh, answer: u.en });
        items.push({ type: 'usage', direction: 'en2zh', word: w, question: u.en, answer: u.zh });
      }
    });
  });
  return items;
}

function updateQuizInfo() {
  const learning = allWords.filter(w=>w.mastery<10).length;
  const mastered = allWords.filter(w=>w.mastery>=10).length;
  const items = buildQuizItems(allWords);
  document.getElementById('quiz-avail-info').innerHTML =
    `學習中：<strong>${learning}</strong> 個單字　熟練：<strong>${mastered}</strong> 個單字<br>
     可出題數量（含用法）：<strong>${items.length}</strong> 題<br>
     <span style="font-size:12px;color:var(--text-dim)">答對 +1 分，答錯 -1 分，滿 10 分進入熟用庫</span>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz() {
  const count = parseInt(document.getElementById('quiz-count').value);
  const includeMastered = document.getElementById('quiz-include-mastered').value==='yes';
  let words = allWords.filter(w=>w.mastery<10);
  if (includeMastered) allWords.filter(w=>w.mastery>=10).forEach(w=>{ if(Math.random()<0.2) words.push(w); });
  const items = buildQuizItems(words);
  if (!items.length) { toast('沒有可測驗的單字！','error'); return; }
  quizQueue = shuffle(items).slice(0, Math.min(count, items.length));
  quizIndex = 0; quizResults = [];
  document.getElementById('quiz-setup-panel').style.display='none';
  document.getElementById('quiz-result-panel').style.display='none';
  document.getElementById('quiz-session-panel').style.display='block';
  renderQuestion();
}

function renderQuestion() {
  const item = quizQueue[quizIndex];
  const total = quizQueue.length;
  document.getElementById('q-progress').style.width = (quizIndex/total*100)+'%';
  document.getElementById('q-progress-text').textContent = `${quizIndex+1} / ${total}`;
  answered = false;

  const isMC = Math.random() < 0.5;
  const card = document.getElementById('quiz-card');
  const nav = document.getElementById('quiz-nav');
  const dirLabel = item.direction==='zh2en' ? '看中文，猜英文' : '看英文，猜中文';
  const typeLabel = item.type==='usage' ? '用法測驗' : '單字測驗';

  if (isMC) {
    // 選擇題：從其他 item 抽干擾選項
    const others = quizQueue.filter((_,i)=>i!==quizIndex);
    const distractors = shuffle(others).slice(0,3).map(o=>o.answer);
    const choices = shuffle([item.answer, ...distractors]);
    card.innerHTML = `
      <div class="quiz-type-label">${typeLabel}・選擇題・${dirLabel}</div>
      <div class="quiz-question">${esc(item.question)}</div>
      <div class="quiz-hint">選出正確答案</div>
      <div class="choices">${choices.map(c=>`<button class="choice-btn" onclick="answerMC(this,'${esc(c)}','${esc(item.answer)}')">${esc(c)}</button>`).join('')}</div>`;
    nav.innerHTML = `<button class="btn btn-secondary" onclick="nextQuestion()" id="next-btn" disabled>下一題 →</button>`;
  } else {
    // 填空題
    card.innerHTML = `
      <div class="quiz-type-label">${typeLabel}・填空題・${dirLabel}</div>
      <div class="quiz-question">${esc(item.question)}</div>
      <div class="quiz-hint">輸入你的答案</div>
      <div class="fill-input-wrap">
        <input type="text" id="fill-ans" placeholder="輸入答案…" onkeydown="if(event.key==='Enter')checkFill()">
        <button class="btn btn-primary" onclick="checkFill()">確認</button>
      </div>
      <div class="fill-result" id="fill-result"></div>`;
    nav.innerHTML = `
      <button class="btn btn-secondary" onclick="markFill(false)">✗ 答錯了</button>
      <button class="btn btn-primary" onclick="markFill(true)">✓ 答對了</button>`;
    setTimeout(()=>document.getElementById('fill-ans')?.focus(),100);
  }
}

function answerMC(btn, choice, correct) {
  if (answered) return;
  answered = true;
  const isCorrect = choice===correct;
  btn.classList.add(isCorrect?'correct':'wrong');
  if (!isCorrect) {
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent===correct) b.classList.add('correct');
    });
  }
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  document.getElementById('next-btn').disabled=false;
  recordResult(isCorrect);
}

function checkFill() {
  const item = quizQueue[quizIndex];
  const result = document.getElementById('fill-result');
  result.className = 'fill-result show';
  result.innerHTML = `<strong>參考答案：</strong>${esc(item.answer)}`;
}

function markFill(correct) {
  if (answered) return;
  answered = true;
  recordResult(correct);
  document.getElementById('quiz-nav').innerHTML =
    `<button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>`;
}

async function recordResult(correct) {
  const item = quizQueue[quizIndex];
  const w = item.word;
  const delta = correct ? 1 : -1;
  const newMastery = Math.max(0, Math.min(10, w.mastery+delta));
  quizResults.push({ item, correct, newMastery });
  try {
    await api('PATCH', `words?id=eq.${w.id}`, { mastery: newMastery });
    const idx = allWords.findIndex(x=>x.id===w.id);
    if (idx!==-1) allWords[idx].mastery=newMastery;
    // 同步更新 quizQueue 裡同一個單字的 mastery
    quizQueue.forEach(q=>{ if(q.word.id===w.id) q.word.mastery=newMastery; });
  } catch(e) { /* silent */ }
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex>=quizQueue.length) showQuizResult();
  else renderQuestion();
}

function showQuizResult() {
  document.getElementById('quiz-session-panel').style.display='none';
  const correct = quizResults.filter(r=>r.correct).length;
  const total = quizResults.length;
  const newMastered = quizResults.filter(r=>r.newMastery>=10&&r.item.word.mastery<10).length;
  const pct = Math.round(correct/total*100);
  const panel = document.getElementById('quiz-result-panel');
  panel.style.display='block';
  panel.innerHTML=`<div class="quiz-result">
    <div class="result-score">${pct}%</div>
    <div class="result-label">答對 ${correct} / ${total} 題</div>
    <div class="result-breakdown">
      <div class="breakdown-row"><span>答對</span><span class="val green">${correct} 題</span></div>
      <div class="breakdown-row"><span>答錯</span><span class="val red">${total-correct} 題</span></div>
      ${newMastered>0?`<div class="breakdown-row"><span>新進熟用庫</span><span class="val yellow">✦ ${newMastered} 個單字</span></div>`:''}
    </div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-primary" onclick="startQuiz()">再測一次</button>
      <button class="btn btn-secondary" onclick="backToSetup()">返回設定</button>
    </div>
  </div>`;
}

function backToSetup() {
  document.getElementById('quiz-result-panel').style.display='none';
  document.getElementById('quiz-setup-panel').style.display='block';
  updateQuizInfo();
}

// ── UTILS ────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent=msg; el.className='toast show '+(type||'success');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2800);
}

document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

// ── INIT ─────────────────────────────────────────────
// 需要在 Supabase 加 translation 欄位
fetchWords();
initAddForm();
</script>
</body>
</html>
